<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Código Postal</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<form id="codigoPostal">

<h2>Código Postal</h2>

<input 
type="text"
placeholder="Escribe 5 números"
pattern="[0-9]{5}"
required
>

<p>Debe contener exactamente 5 números</p>

<button type="submit">Validar</button>

</form>

<script src="script.js"></script>
</body>
</html>
